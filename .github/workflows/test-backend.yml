name: Backend Tests

on:
  push:
    branches: [main, develop, feature/**]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test --frozen

      - name: Run tests
        working-directory: backend
        run: |
          uv run --project .. pytest -v --cov --cov-report=xml --cov-report=term-missing -m "not llm"
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage thresholds
        working-directory: backend
        run: |
          echo "Checking coverage thresholds..."
          uv run --project .. coverage report --fail-under=20

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('backend/coverage.json', 'utf8'));
            const total = coverage.totals;

            const comment = `## 📊 Backend Test Coverage

            | Metric | Coverage |
            |--------|----------|
            | Statements | ${total.percent_covered.toFixed(2)}% |
            | Missing Lines | ${total.missing_lines} |
            | Covered Lines | ${total.covered_lines} |

            ${total.percent_covered >= 20 ? '✅' : '⚠️'} Coverage threshold: 20%

            **Note:** Tests marked with \`@pytest.mark.llm\` are skipped in CI to avoid API costs.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Run LLM tests (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        working-directory: backend
        run: |
          uv run --project .. pytest -v -m "llm"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
