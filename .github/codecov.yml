codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "20...100"

  status:
    project:
      default: false
      frontend:
        target: 50%
        threshold: 1%
        flags:
          - frontend
      backend:
        target: 20%
        threshold: 1%
        flags:
          - backend
    patch: false

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "frontend/node_modules"
  - "frontend/dist"
  - "frontend/__tests__"
  - "frontend/**/*.config.*"
  - "backend/tests"
  - "backend/**/__pycache__"
  - "backend/venv"
  - "backend/.venv"

flags:
  frontend:
    paths:
      - frontend/src
    carryforward: true

  backend:
    paths:
      - backend/services
      - backend/routes
      - backend/utils
      - backend/app.py
    carryforward: true
